{% load static %}
{% load pwa %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
  
    
   <link rel="icon" type="image/png" sizes="16x16" href="{% static '/favicon-16x16.png' %}">

    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <link rel="manifest" href="{% static 'core/manifest.json' %}">
    <meta name="theme-color" content="#0d47a1">
    <title>{% block title %}Aynal Haque{% endblock %}</title>

    <link rel="stylesheet" href="{% static 'css/styles.css' %}">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body {
        font-family: 'Arial', sans-serif;
        background: linear-gradient(180deg, #fff8e1 0%, #e3f2fd 100%);
        color: #0d0d0e;
        margin: 0;
        padding: 0;
        line-height: 1.6;
        transition: background-color 0.4s ease;
        min-height: 100vh;
        scroll-behavior: smooth;
}

.navbar {
            transition: background-color 0.5 ease;
            background-color: #ff6f00 !important;
            box-shadow: 0 4px 8px rgba(255, 111, 0, 0.3);
            
        }

.navbar a.nav-link {
            color: #ffffff !important;
            transition: color 0.4s ease, background-color 0.5s ease, transform 0.3s ease;
            border-radius: 20px;
            padding: 8px 12px;
            font-size: larger;
            font-family: 'Lucida Sans', 'Lucida Sans Regular', 'Lucida Grande', 'Lucida Sans Unicode', Geneva, Verdana, sans-serif;
        }

 .navbar a.nav-link:hover {
            background-color: #ffeb3b;
            color: #ff6f00 !important;
            transform: scale(1.05);
        }

 .navbar-brand:hover {
            color: #ffffff !important;
            text-shadow: 1px 1px 2px #000;
        }

 .navbar-nav .nav-link.active {
            background-color: #4caf50;
            color: white !important;
        }

 .alert {
            animation: fadeIn 0.8s ease-in-out;
            border-radius: 20px;
            box-shadow: 0 4px 8px rgba(76, 175, 80, 0.2);
            margin-bottom: 20px;
            background-color: #e8f5e8 !important;
            border-color: #4caf50 !important;
        }

 @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }

    
    </style>
</head>

<body>
    
    <header>
        {% include "navbar.html" %}
    </header>

    <div class="container mt-3 mb-5 p-3 bg-light rounded shadow-sm">
        {% if messages %}
            {% for message in messages %}
                <div class="alert alert-{{ message.tags }} alert-dismissible fade show" role="alert">
                    {{ message }}
                    <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                </div>
            {% endfor %}
        {% endif %}
    </div>

    <div class="container mt-4 mb-5 p-4">
        {% block content %}{% endblock %}
    </div>

    <div class="mt-5">
        {% include "footer.html" %}
    </div>
<script>
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register("{% static 'core/service-worker.js' %}")
        .then(reg => console.log('Service Worker registered:', reg))
        .catch(err => console.log('Service Worker registration failed:', err));
    });
  }
</script>


    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
