{% extends 'base.html' %}

{% block title %}Join Our Team{% endblock %}

{% block content %}
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-lg-8">
            <div class="card shadow-sm border-0">
                <div class="card-body p-5">
                    <h1 class="mb-4">Join Our Team</h1>
                    <p class="text-muted">Share your details and we'll reach out with the next steps.</p>

                    <form method="post" novalidate>
                        {% csrf_token %}
                        {{ form.as_p }}
                        <button type="submit" class="btn btn-primary btn-lg mt-3">Submit Request</button>
                    </form>

                    <div class="mt-4">
                        <a href="{% url 'home-page' %}" class="text-decoration-none">&larr; Back to home</a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
