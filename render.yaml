services:
  - type: web
    name: aynal-portfolio
    runtime: python
    plan: free

    buildCommand: bash build.sh

    startCommand: gunicorn aynal_portfolio.wsgi:application

    envVars:
      - key: DJANGO_SETTINGS_MODULE
        value: aynal_portfolio.settings.production

      - key: DATABASE_URL
        fromDatabase:
          name: mysitedb
          property: connectionString

      - key: SECRET_KEY
        generateValue: true

      - key: WEB_CONCURRENCY
        value: 2

databases:
  - name: mysitedb
    plan: free